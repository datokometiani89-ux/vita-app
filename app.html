  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        function tr(k, fb) { return (window.VITA && VITA.t) ? VITA.t(k) : fb; }
        function showUpdate(worker) {
          if (document.querySelector(".sw-update")) return;
          var b = document.createElement("div");
          b.className = "sw-update";
          b.innerHTML = "<span>" + tr("swUpdate", "ახალი ვერსია ხელმისაწვდომია") + "</span>" +
            "<button>" + tr("swReload", "განახლება") + "</button>";
          b.querySelector("button").onclick = function () { worker.postMessage({ type: "SKIP_WAITING" }); b.remove(); };
          document.body.appendChild(b);
        }
        navigator.serviceWorker.register("sw.js").then(function (reg) {
          if (reg.waiting && navigator.serviceWorker.controller) showUpdate(reg.waiting);
          reg.addEventListener("updatefound", function () {
            var nw = reg.installing;
            if (nw) nw.addEventListener("statechange", function () {
              if (nw.state === "installed" && navigator.serviceWorker.controller) showUpdate(nw);
            });
          });
        }).catch(function () {});
        var reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (reloaded) return; reloaded = true; window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
