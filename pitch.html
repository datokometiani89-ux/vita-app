<!DOCTYPE html>
<html lang="ka" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VITA — Investor one-pager</title>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=71">
  <style>
    body { background: var(--bg); color: var(--ink); -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .pg { max-width: 960px; margin: 0 auto; padding: 0 20px 60px; }
    .pg-top { display: flex; align-items: center; justify-content: space-between; padding: 20px 2px; }
    .pg-brand { display: flex; align-items: center; gap: 11px; font-size: 22px; font-weight: 800; }
    .pg-top__r { display: flex; gap: 10px; }
    .pg-btn { font-size: 13px; font-weight: 700; color: var(--ink-2); background: var(--card); border: 1.5px solid var(--line); border-radius: 10px; padding: 8px 13px; cursor: pointer; }
    .pg-hero { text-align: center; padding: 30px 10px 28px; }
    .pg-kick { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--green-dark); background: var(--green-tint); padding: 6px 14px; border-radius: 99px; }
    .pg-hero h1 { font-size: clamp(26px, 4.6vw, 44px); line-height: 1.1; margin: 14px auto 12px; max-width: 760px; }
    .pg-hero h1 .hl { color: var(--green); }
    .pg-hero p { color: var(--ink-2); font-size: 17px; max-width: 620px; margin: 0 auto; line-height: 1.6; }
    .pg-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 26px 0; }
    .pg-stat { background: var(--card); border: 1.5px solid var(--line); border-radius: 16px; padding: 18px; text-align: center; }
    .pg-stat b { display: block; font-size: 26px; font-weight: 800; color: var(--green-dark); }
    .pg-stat span { color: var(--muted); font-size: 12.5px; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em; color: var(--green-dark); margin: 34px 0 14px; }
    .pg-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .card { background: var(--card); border: 1.5px solid var(--line); border-radius: 18px; padding: 20px 22px; }
    .card h3 { font-size: 17px; margin-bottom: 8px; }
    .card p, .card li { color: var(--ink-2); font-size: 14.5px; line-height: 1.6; }
    .card ul { margin: 6px 0 0; padding-left: 18px; }
    .card li { margin-bottom: 6px; }
    .wedge { background: radial-gradient(120% 140% at 50% 0%, color-mix(in srgb, var(--green) 14%, var(--card)), var(--card)); border: 1.5px solid color-mix(in srgb, var(--green) 24%, var(--line)); border-radius: 22px; padding: 26px; text-align: center; }
    .wedge h3 { font-size: 22px; margin-bottom: 8px; }
    .wedge p { color: var(--ink-2); max-width: 640px; margin: 0 auto 16px; line-height: 1.6; }
    .chips { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; }
    .chip { display: inline-flex; align-items: center; gap: 7px; background: var(--card); border: 1.5px solid var(--line); border-radius: 99px; padding: 8px 15px; font-weight: 600; font-size: 13.5px; }
    .chip svg { width: 16px; color: var(--green); }
    .apps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .app { border: 1.5px solid var(--line); border-radius: 16px; padding: 18px; background: var(--card); }
    .app .ic { width: 42px; height: 42px; border-radius: 12px; display: grid; place-content: center; margin-bottom: 10px; }
    .app h3 { font-size: 16px; margin-bottom: 4px; }
    .app p { color: var(--ink-2); font-size: 13px; line-height: 1.5; }
    .rev { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .rev div { background: var(--card); border: 1.5px solid var(--line); border-radius: 14px; padding: 15px; }
    .rev b { display: block; font-size: 14.5px; margin-bottom: 4px; }
    .rev span { color: var(--muted); font-size: 12.5px; line-height: 1.45; }
    .road { display: flex; gap: 12px; flex-wrap: wrap; }
    .road div { flex: 1; min-width: 150px; background: var(--card); border: 1.5px solid var(--line); border-radius: 14px; padding: 14px; }
    .road b { font-size: 13px; color: var(--green-dark); }
    .road p { font-size: 13px; color: var(--ink-2); margin-top: 4px; line-height: 1.5; }
    .ask { background: linear-gradient(150deg, var(--green-deep), var(--green)); color: #fff; border-radius: 22px; padding: 30px; text-align: center; margin-top: 16px; }
    .ask h3 { font-size: 22px; margin-bottom: 8px; }
    .ask p { opacity: .92; max-width: 560px; margin: 0 auto 6px; line-height: 1.6; }
    .ph { color: var(--muted); font-style: italic; }
    .foot { text-align: center; color: var(--muted); font-size: 12.5px; margin-top: 22px; }
    @media (max-width: 720px) { .pg-stats, .apps, .rev { grid-template-columns: 1fr 1fr; } .pg-2 { grid-template-columns: 1fr; } }
    @media print { .pg-top__r { display: none; } .ask { -webkit-print-color-adjust: exact; } }
  </style>
</head>
<body>
  <div class="pg" id="pg"></div>

  <script src="js/i18n.js?v=71"></script>
  <script src="js/ui.js?v=71"></script>
  <script>
  (function () {
    var V = window.VITA, esc = V.esc, root = document.getElementById("pg");
    function L(o) { return o[V.lang()] || o.en; }
    var ph = '<span class="ph">[fill]</span>';

    function render() {
      document.documentElement.lang = V.lang();
      root.innerHTML =
        '<div class="pg-top"><div class="pg-brand">' + V.logo(30) + " VITA</div>" +
          '<div class="pg-top__r">' +
            '<button class="pg-btn" id="lang">' + (V.lang() === "ka" ? "EN" : "ქარ") + "</button>" +
            '<button class="pg-btn" id="prn">' + L({ ka: "ბეჭდვა / PDF", en: "Print / PDF" }) + "</button>" +
          "</div></div>" +

        '<div class="pg-hero"><span class="pg-kick">' + L({ ka: "ინვესტორის one-pager", en: "Investor one-pager" }) + "</span>" +
          "<h1>" + L({ ka: 'AI-native <span class="hl">ჰოლისტიკური ჯანმრთელობა</span> — ტელეფონი როგორც დიაგნოსტიკა, დაკავშირებული ექიმებთან და დამსაქმებლებთან', en: 'AI-native <span class="hl">holistic health</span> — your phone as a diagnostic, connected to doctors and employers' }) + "</h1>" +
          "<p>" + L({ ka: "VITA აერთიანებს ზოგად, მენტალურ, ფიზიკურ და ესთეტიკურ ჯანმრთელობას ერთ AI-ოპერაციულ სისტემაში: სკანი → insight → გეგმა → ექიმი → დაფარული დამსაქმებლის მიერ.", en: "VITA unifies general, mental, physical and aesthetic health into one AI operating system: scan → insight → plan → doctor → covered by the employer." }) + "</p></div>" +

        '<div class="pg-stats">' +
          stat(L({ ka: "30წმ", en: "30s" }), L({ ka: "AI ჯანმრთელობის სკანი", en: "AI health scan" })) +
          stat("3", L({ ka: "აპი (პაციენტი/ექიმი/ბიზნესი)", en: "apps (patient/doctor/business)" })) +
          stat("4", L({ ka: "სკან-მოდალობა + ბიო-ასაკი", en: "scan modalities + bio-age" })) +
          stat(L({ ka: "ცოცხალი", en: "live" }), L({ ka: "realtime backend + AI", en: "realtime backend + AI" })) +
        "</div>" +

        "<h2>" + L({ ka: "პრობლემა", en: "Problem" }) + "</h2><div class='pg-2'>" +
          card(L({ ka: "ფრაგმენტული ზრუნვა", en: "Fragmented care" }), L({ ka: "ზოგადი, მენტალური, ფიტნესი და ესთეტიკა ცალ-ცალკე აპებში; რეაქტიული და არა-პრევენციული.", en: "General, mental, fitness and aesthetic health live in separate apps; care is reactive, not preventive." })) +
          card(L({ ka: "ხელმისაწვდომობა", en: "Access gap" }), L({ ka: "განვითარებად ბაზრებზე ექიმთან წვდომა ძვირი/ნელია; დიაგნოსტიკა კლინიკაშია ჩაკეტილი.", en: "In emerging markets doctor access is costly/slow; diagnostics are locked inside clinics." })) +
        "</div>" +

        "<h2>" + L({ ka: "გადაწყვეტა", en: "Solution" }) + "</h2><div class='card'><p>" +
          L({ ka: "ერთი ჰოლისტიკური AI ჯანმრთელობის OS. მომხმარებელი ტელეფონით იღებს დიაგნოსტიკურ სიგნალებს, AI აძლევს პერსონალურ გეგმას, საჭიროებისას ერთი შეხებით უკავშირდება ექიმს, ხოლო დამსაქმებელი/მზღვეველი ფარავს ხარჯს — ყველაფერი ერთ ეკოსისტემაში.", en: "One holistic AI health OS. The user gets diagnostic signals from their phone, the AI gives a personal plan, connects to a doctor in one tap when needed, and the employer/insurer covers the cost — all in one ecosystem." }) +
          "</p></div>" +

        "<h2>" + L({ ka: "Wedge — AI ჯანმრთელობის სკანი", en: "Wedge — AI Health Scan" }) + "</h2>" +
          '<div class="wedge"><h3>' + L({ ka: "ტელეფონი = დიაგნოსტიკა", en: "Your phone = a diagnostic" }) + "</h3>" +
          "<p>" + L({ ka: "კამერა და მიკროფონი → გული (PPG: HR/HRV/სუნთქვა/SpO₂), კანი, ხმა, კოგნიცია → ბიოლოგიური ასაკი და ჯანმრთელობის ქულა. გლობალურად-fundable hook; მუშაობს ნებისმიერ ბაზარზე.", en: "Camera and mic → heart (PPG: HR/HRV/respiration/SpO₂), skin, voice, cognition → biological age and a health score. The globally-fundable hook; works in any market." }) + "</p>" +
          '<div class="chips">' + [["heart", { ka: "გული", en: "Heart" }], ["camera", { ka: "კანი", en: "Skin" }], ["mic", { ka: "ხმა", en: "Voice" }], ["brain", { ka: "კოგნიცია", en: "Cognition" }]].map(function (m) { return '<span class="chip">' + V.icon(m[0]) + L(m[1]) + "</span>"; }).join("") + "</div></div>" +

        "<h2>" + L({ ka: "პლატფორმა — two-sided + B2B2C", en: "Platform — two-sided + B2B2C" }) + "</h2><div class='apps'>" +
          app("heart", "var(--green-tint)", "var(--green-dark)", "VITA", L({ ka: "პაციენტის აპი — სკანი, გეგმა, ჩატი, ჯავშანი.", en: "Patient app — scan, plan, chat, booking." })) +
          app("stethoscope", "color-mix(in srgb,#e8536b 16%,var(--card))", "#e8536b", "VITA for Doctors", L({ ka: "ექიმის კონსოლი — ვიზიტები, vitals, ვიდეო, რეცეპტი.", en: "Clinician console — visits, vitals, video, prescriptions." })) +
          app("shield", "var(--blue-tint)", "var(--blue)", "VITA for Business", L({ ka: "დამსაქმებლის dashboard — რისკი, ჩართულობა, ROI.", en: "Employer dashboard — risk, engagement, ROI." })) +
        "</div>" +

        "<h2>" + L({ ka: "ბიზნეს-მოდელი", en: "Business model" }) + "</h2><div class='rev'>" +
          rev(L({ ka: "Marketplace", en: "Marketplace" }), L({ ka: "კომისია ჯავშნებზე (კლინიკები/აფთიაქები).", en: "Commission on bookings (clinics/pharmacies)." })) +
          rev("VITA+", L({ ka: "freemium ხელმოწერა — AI რეპორტი, ისტორია.", en: "Freemium subscription — AI report, history." })) +
          rev(L({ ka: "ტელემედიცინა", en: "Telemedicine" }), L({ ka: "საფასური ვიდეო-კონსულტაციებზე.", en: "Fees on video consultations." })) +
          rev("B2B2C", L({ ka: "კორპორ./სადაზღვევო subscription თანამშრომლებზე.", en: "Corporate/insurer subscriptions per employee." })) +
        "</div>" +

        "<h2>" + L({ ka: "ბაზარი & traction", en: "Market & traction" }) + "</h2><div class='pg-2'>" +
          card(L({ ka: "ბაზარი", en: "Market" }), L({ ka: "Beachhead: საქართველო → განვითარებადი ბაზრები / გლობალური. TAM/SAM/SOM: ", en: "Beachhead: Georgia → emerging markets / global. TAM/SAM/SOM: " }) + ph + ".") +
          card(L({ ka: "სტატუსი (აშენებულია)", en: "Status (built)" }), "<ul><li>" + L({ ka: "3 მუშა აპი (პაციენტი/ექიმი/ბიზნესი), deployed", en: "3 working apps (patient/doctor/business), deployed" }) + "</li><li>" + L({ ka: "AI ასისტენტი (Gemini/Claude) + offline fallback", en: "AI assistant (Gemini/Claude) + offline fallback" }) + "</li><li>" + L({ ka: "მულტიმოდალური სკანი + realtime backend (SSE)", en: "Multimodal scan + realtime backend (SSE)" }) + "</li></ul>") +
        "</div>" +

        "<h2>" + L({ ka: "Roadmap", en: "Roadmap" }) + "</h2><div class='road'>" +
          road(L({ ka: "ვალიდაცია", en: "Validation" }), L({ ka: "real-device + ML მოდელები, რეგულაცია.", en: "Real-device + ML models, regulation." })) +
          road(L({ ka: "გადახდა/ვიდეო", en: "Payments/video" }), L({ ka: "Stripe + Daily/LiveKit/Twilio.", en: "Stripe + Daily/LiveKit/Twilio." })) +
          road(L({ ka: "მასშტაბი", en: "Scale" }), L({ ka: "B2B2C კონტრაქტები, DB, გუნდი.", en: "B2B2C contracts, DB, team." })) +
        "</div>" +

        '<div class="ask"><h3>' + L({ ka: "Ask", en: "The ask" }) + "</h3><p>" +
          L({ ka: "ვიზიდავთ ", en: "Raising " }) + ph + L({ ka: " — ", en: " — " }) + ph + L({ ka: " (გუნდი, ვალიდაცია, GTM).", en: " (team, validation, GTM)." }) + "</p>" +
          '<p style="font-size:14px">' + L({ ka: "კონტაქტი: ", en: "Contact: " }) + ph + "</p></div>" +

        '<div class="foot">' + L({ ka: "ფიგურები [fill]-ით მონიშნული შესავსებია რეალური/მოძიებული მონაცემებით. © 2026 VITA Health AI.", en: "Figures marked [fill] are to be completed with real/sourced data. © 2026 VITA Health AI." }) + "</div>";

      root.querySelector("#lang").addEventListener("click", function () { V.setLang(V.lang() === "ka" ? "en" : "ka"); render(); });
      root.querySelector("#prn").addEventListener("click", function () { window.print(); });
    }
    function stat(b, s) { return '<div class="pg-stat"><b>' + b + "</b><span>" + esc(s) + "</span></div>"; }
    function card(t, body) { return '<div class="card"><h3>' + esc(t) + "</h3><p>" + body + "</p></div>"; }
    function app(ic, bg, col, name, desc) { return '<div class="app"><div class="ic" style="background:' + bg + ";color:" + col + '">' + V.icon(ic) + "</div><h3>" + esc(name) + "</h3><p>" + esc(desc) + "</p></div>"; }
    function rev(b, s) { return "<div><b>" + esc(b) + "</b><span>" + esc(s) + "</span></div>"; }
    function road(b, p) { return "<div><b>" + esc(b) + "</b><p>" + esc(p) + "</p></div>"; }

    if (localStorage.getItem("vita.theme") === "dark") document.documentElement.setAttribute("data-theme", "dark");
    render();
  })();
  </script>
</body>
</html>
